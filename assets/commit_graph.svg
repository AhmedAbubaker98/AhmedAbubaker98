.area{fill:url(#area)}.line{stroke:#C5A96D;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:1000;stroke-dashoffset:1000;animation:draw 1.9s ease forwards}
.dot{fill:#daa522;opacity:0;animation:pop .35s ease forwards;animation-delay:calc(var(--i)*14ms + 220ms)}
.sidebar-text{fill:#aaaaaa;font:12px 'Consolas',monospace}.sidebar-label{fill:#C5A96D;font:12px 'Segoe UI',sans-serif;font-weight:bold}
.icon{stroke:#C5A96D;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.icon-fill{fill:#C5A96D;stroke:none}
@keyframes draw{to{stroke-dashoffset:0}}@keyframes pop{to{opacity:1}}
</style>
