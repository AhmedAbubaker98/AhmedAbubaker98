name: Update GitHub Stats And Visuals

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      run_stats:
        description: "Run scripts/stats.py"
        required: true
        default: true
        type: boolean
      run_blocks:
        description: "Run scripts/generate_commit_blocks.py"
        required: true
        default: true
        type: boolean
      run_graph:
        description: "Run scripts/generate_commit_graph.py"
        required: true
        default: true
        type: boolean
      account:
        description: "Account for visualization scripts (__combined__ or username)"
        required: false
        default: "__combined__"
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install requests

      - name: Run stats aggregation
        if: github.event_name != 'workflow_dispatch' || inputs.run_stats
        env:
          TOKEN_PERSONAL: ${{ secrets.TOKEN_PERSONAL }}
          TOKEN_WORK: ${{ secrets.TOKEN_WORK }}
        run: python scripts/stats.py

      - name: Run animated commit blocks
        if: github.event_name != 'workflow_dispatch' || inputs.run_blocks
        run: |
          ACCOUNT="${{ github.event_name == 'workflow_dispatch' && inputs.account || '__combined__' }}"
          python scripts/generate_commit_blocks.py --account "$ACCOUNT"

      - name: Run animated commit graph
        if: github.event_name != 'workflow_dispatch' || inputs.run_graph
        run: |
          ACCOUNT="${{ github.event_name == 'workflow_dispatch' && inputs.account || '__combined__' }}"
          python scripts/generate_commit_graph.py --account "$ACCOUNT" --granularity monthly

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add \
            assets/stats.json \
            assets/stats.md \
            assets/stats_timeline_daily.csv \
            assets/stats_timeline_monthly.csv \
            assets/commit_blocks.svg \
            assets/commit_graph.svg

          git diff --cached --quiet || git commit -m "Update stats and visualizations"
          git push